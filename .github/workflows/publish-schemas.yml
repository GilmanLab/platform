name: Publish Schemas

on:
  push:
    tags:
      - 'schemas/v*'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Resolve Release Target
        id: target
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          component="schemas"
          schemas_dir="schemas"

          case "${tag}" in
            ${component}/v0.*) ;;
            *)
              echo "unsupported tag: ${tag}" >&2
              exit 1
              ;;
          esac

          version="${tag#${component}/}"
          file_version="v$(tr -d '\n' < "${schemas_dir}/VERSION")"

          if [ "${version}" != "${file_version}" ]; then
            echo "Tag version ${version} does not match VERSION ${file_version}" >&2
            exit 1
          fi

          {
            echo "component=${component}"
            echo "version=${version}"
            echo "schemas_dir=${schemas_dir}"
          } >> "${GITHUB_OUTPUT}"

      - name: Setup Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version-file: ${{ steps.target.outputs.schemas_dir }}/go.mod
          cache: false

      - name: Setup Moon Toolchain
        uses: moonrepo/setup-toolchain@261c62cb5b0f580c7be7c8cd0f023a2e96756095 # v0.6.4
        with:
          auto-install: true
          auto-setup: true
          cache-base: ${{ github.event.repository.default_branch }}

      - name: Check Schemas
        run: moon run schemas:check

      - name: Login to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Dry Run CUE Publish
        working-directory: ${{ steps.target.outputs.schemas_dir }}
        env:
          CUE_REGISTRY: file:${{ github.workspace }}/.github/cue-registry.cue
        run: proto exec --tools-from-config -- cue mod publish --dry-run "${{ steps.target.outputs.version }}"

      - name: Publish CUE Module
        working-directory: ${{ steps.target.outputs.schemas_dir }}
        env:
          CUE_REGISTRY: file:${{ github.workspace }}/.github/cue-registry.cue
        run: proto exec --tools-from-config -- cue mod publish "${{ steps.target.outputs.version }}"
