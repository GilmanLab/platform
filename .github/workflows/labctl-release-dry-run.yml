name: labctl Release Dry Run

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dry-run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RELEASE_DRY_RUN_REQUIRED: ${{ github.event_name != 'pull_request' || (startsWith(github.head_ref, 'release-please--branches--') && github.event.pull_request.head.repo.full_name == github.repository) }}
    steps:
      - name: Skip non-release pull request
        if: env.RELEASE_DRY_RUN_REQUIRED != 'true'
        run: echo "labctl release dry run is not required for this pull request."

      - name: Checkout
        if: env.RELEASE_DRY_RUN_REQUIRED == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        if: env.RELEASE_DRY_RUN_REQUIRED == 'true'
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version-file: tools/labctl/go.mod
          cache: false

      - name: Install Syft
        if: env.RELEASE_DRY_RUN_REQUIRED == 'true'
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Verify GoReleaser Pro secret
        if: env.RELEASE_DRY_RUN_REQUIRED == 'true'
        env:
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${GORELEASER_KEY}" ]]; then
            echo "GORELEASER_KEY is required for the labctl release dry run." >&2
            exit 1
          fi

      - name: Create local dry-run tag
        if: env.RELEASE_DRY_RUN_REQUIRED == 'true'
        id: version
        shell: bash
        run: |
          set -euo pipefail

          version="0.0.0-dryrun.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}"
          tag="labctl-v${version}"

          git \
            -c user.name="github-actions[bot]" \
            -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
            -c tag.gpgSign=false \
            tag --annotate --message "temporary labctl release dry-run tag" "${tag}" "${GITHUB_SHA}"

          echo "tag=${tag}" >>"${GITHUB_OUTPUT}"
          echo "version=${version}" >>"${GITHUB_OUTPUT}"

      - name: Build release artifacts without publishing
        if: env.RELEASE_DRY_RUN_REQUIRED == 'true'
        uses: goreleaser/goreleaser-action@e24998b8b67b290c2fa8b7c14fcfa7de2c5c9b8c # v7.1.0
        with:
          distribution: goreleaser-pro
          version: v2.15.4
          workdir: tools/labctl
          args: release --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}

      - name: Validate dry-run artifact metadata
        if: env.RELEASE_DRY_RUN_REQUIRED == 'true'
        working-directory: tools/labctl
        shell: bash
        run: |
          set -euo pipefail

          expected_version="${{ steps.version.outputs.version }}"
          binary_name="labctl"
          asset_prefix="labctl_"
          mapfile -t binaries < <(jq -r --arg asset_prefix "${asset_prefix}" '
            .[]
            | select(.type == "Binary")
            | select(.name | startswith($asset_prefix))
            | .name
          ' dist/artifacts.json | sort)
          mapfile -t sboms < <(jq -r '
            .[]
            | select(.type == "SBOM")
            | .name
          ' dist/artifacts.json | sort)

          if [[ "${#binaries[@]}" -ne 4 ]]; then
            echo "expected 4 named binary artifacts, found ${#binaries[@]}" >&2
            jq . dist/artifacts.json >&2
            exit 1
          fi
          if [[ "${#sboms[@]}" -ne 4 ]]; then
            echo "expected 4 SBOM artifacts, found ${#sboms[@]}" >&2
            jq . dist/artifacts.json >&2
            exit 1
          fi

          for os in darwin linux; do
            for arch in amd64 arm64; do
              expected="${binary_name}_${expected_version}_${os}_${arch}"
              if ! printf '%s\n' "${binaries[@]}" | grep -Fxq "${expected}"; then
                echo "missing binary artifact ${expected}" >&2
                printf '%s\n' "${binaries[@]}" >&2
                exit 1
              fi
              if ! printf '%s\n' "${sboms[@]}" | grep -Fxq "${expected}.sbom.json"; then
                echo "missing SBOM artifact ${expected}.sbom.json" >&2
                printf '%s\n' "${sboms[@]}" >&2
                exit 1
              fi
            done
          done

          jq -e '.[] | select(.type == "Checksum" and .name == "checksums.txt")' dist/artifacts.json >/dev/null
          test -s dist/checksums.txt

      - name: Materialize dry-run release assets
        if: env.RELEASE_DRY_RUN_REQUIRED == 'true'
        working-directory: tools/labctl
        shell: bash
        run: |
          set -euo pipefail

          jq -r --arg asset_prefix "labctl_" '
            .[]
            | select(.type == "Binary")
            | select(.name | startswith($asset_prefix))
            | [.path, .name]
            | @tsv
          ' dist/artifacts.json | while IFS=$'\t' read -r source name; do
            cp "${source}" "dist/${name}"
            chmod 0755 "dist/${name}"
          done

          (cd dist && shasum -a 256 -c checksums.txt)

      - name: Smoke test dry-run binary version metadata
        if: env.RELEASE_DRY_RUN_REQUIRED == 'true'
        working-directory: tools/labctl
        shell: bash
        run: |
          set -euo pipefail

          host_os="$(go env GOHOSTOS)"
          host_arch="$(go env GOHOSTARCH)"
          expected_version="${{ steps.version.outputs.version }}"
          binary_name="labctl"
          bin="$(find dist -type f -name "${binary_name}" | grep "/${binary_name}_${host_os}_${host_arch}_" | head -n 1 || true)"

          if [[ -z "${bin}" || ! -f "${bin}" ]]; then
            echo "failed to locate host binary in dist/" >&2
            find dist -maxdepth 2 -type f | sort >&2
            exit 1
          fi

          version_output="$("${bin}" version)"
          printf 'version output: %s\n' "${version_output}"

          [[ "${version_output}" == "labctl ${expected_version}" ]]
