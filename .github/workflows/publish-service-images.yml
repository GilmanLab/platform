name: Publish Service Images

on:
  push:
    tags:
      - 'dns-mirror-v*'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Resolve Release Target
        id: target
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          case "${tag}" in
            dns-mirror-v*) component="dns-mirror" ;;
            *)
              echo "unsupported tag: ${tag}" >&2
              exit 1
              ;;
          esac

          version="${tag#${component}-v}"
          service_dir="services/${component}"
          file_version="$(tr -d '\n' < "${service_dir}/VERSION")"

          if [ "${version}" != "${file_version}" ]; then
            echo "Tag version ${version} does not match VERSION ${file_version}" >&2
            exit 1
          fi

          {
            echo "component=${component}"
            echo "version=${version}"
            echo "service_dir=${service_dir}"
            echo "image=ghcr.io/gilmanlab/platform/services/${component}"
          } >> "${GITHUB_OUTPUT}"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Setup Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Login to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ${{ steps.target.outputs.service_dir }}
          file: ${{ steps.target.outputs.service_dir }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.target.outputs.image }}:${{ steps.target.outputs.version }}
            ${{ steps.target.outputs.image }}:latest
