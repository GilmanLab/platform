layer: 'scaffolding'

project:
  title: 'GilmanLab Platform'
  description: 'Reusable platform components, shared manifests, and automation for GilmanLab.'
  owner: 'GilmanLab'
  maintainers:
    - 'josh'

workspace:
  inheritedTasks:
    include: []

tasks:
  check:
    command: 'uv run scripts/render_bootstrap.py validate'
    toolchains: 'system'
    inputs:
      - 'bootstrap/**/*'
      - 'scripts/render_bootstrap.py'
    options:
      cache: false
      runInCI: true
