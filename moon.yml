layer: 'scaffolding'

project:
  title: 'GilmanLab Platform'
  description: 'Reusable platform components, shared manifests, and automation for GilmanLab.'
  owner: 'GilmanLab'
  maintainers:
    - 'josh'

workspace:
  inheritedTasks:
    include: []

tasks:
  check:
    script: |
      uv run scripts/render_bootstrap.py validate
      uv run scripts/render_rgds.py validate
    toolchains: 'system'
    inputs:
      - 'bootstrap/**/*'
      - 'cue.mod/**/*'
      - 'rgds/**/*'
      - 'scripts/render_bootstrap.py'
      - 'scripts/render_rgds.py'
    options:
      cache: false
      runInCI: true
