layer: 'application'
tags:
  - 'go'
  - 'service'
  - 'aws'

project:
  title: 'github-token-broker'
  description: 'AWS Lambda broker for short-lived GitHub App installation tokens.'
  owner: 'GilmanLab'
  maintainers:
    - 'josh'

tasks:
  check:
    command: 'bash -lc "go test ./... && just build"'
    toolchains: 'system'
    inputs:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'Justfile'
      - 'VERSION'
    outputs:
      - 'dist/github-token-broker.zip'
    options:
      cache: false
      runInCI: true
