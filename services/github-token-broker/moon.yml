layer: 'application'
tags:
  - 'go'
  - 'service'
  - 'aws'

project:
  title: 'github-token-broker'
  description: 'AWS Lambda broker for short-lived GitHub App installation tokens.'
  owner: 'GilmanLab'
  maintainers:
    - 'josh'

tasks:
  check:
    command: 'bash -lc "go test ./... && rm -rf build dist && mkdir -p build dist && GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -buildvcs=false -tags lambda.norpc -trimpath -ldflags=\"-s -w\" -o build/bootstrap ./cmd/github-token-broker && (cd build && zip -X ../dist/github-token-broker.zip bootstrap)"'
    toolchains: 'system'
    inputs:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'Justfile'
      - 'VERSION'
    outputs:
      - 'dist/github-token-broker.zip'
    options:
      cache: false
      runInCI: true
