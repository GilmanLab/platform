layer: 'application'
tags:
  - 'go'
  - 'cli'

project:
  title: 'labctl'
  description: 'Homelab day-to-day and bootstrap operations CLI.'
  owner: 'GilmanLab'
  maintainers:
    - 'josh'

tasks:
  lint:
    command: 'bash -lc "if find . -name ''*.go'' -not -path ''./vendor/*'' -print -quit | grep -q .; then go tool golangci-lint run --config .golangci.yml ./...; else echo ''no Go files to lint''; fi"'
    toolchains: 'system'
    deps:
      - 'schemas:generate-check'
    inputs:
      - '/go.work'
      - '/go.work.sum'
      - '/schemas/lab/**/*.cue'
      - '/schemas/lab/**/*.go'
      - '**/*.go'
      - '.golangci.yml'
      - 'go.mod'
      - 'go.sum'
    options:
      cache: false

  format:
    command: 'bash -lc "if find . -name ''*.go'' -not -path ''./vendor/*'' -print -quit | grep -q .; then go tool golangci-lint fmt --config .golangci.yml --diff; else echo ''no Go files to format''; fi"'
    toolchains: 'system'
    deps:
      - 'schemas:generate-check'
    inputs:
      - '/go.work'
      - '/go.work.sum'
      - '/schemas/lab/**/*.cue'
      - '/schemas/lab/**/*.go'
      - '**/*.go'
      - '.golangci.yml'
      - 'go.mod'
      - 'go.sum'
    options:
      cache: false

  test:
    command: 'bash -lc "if find . -name ''*.go'' -not -path ''./vendor/*'' -print -quit | grep -q .; then go test ./...; else echo ''no Go packages to test''; fi"'
    toolchains: 'system'
    deps:
      - 'schemas:generate-check'
    inputs:
      - '/go.work'
      - '/go.work.sum'
      - '/schemas/lab/**/*.cue'
      - '/schemas/lab/**/*.go'
      - '**/*.go'
      - 'cmd/labctl/testdata/**/*'
      - 'go.mod'
      - 'go.sum'
    options:
      cache: false

  image-smoke:
    script: |
      set -euo pipefail

      tmp="$(mktemp -d)"
      trap 'rm -rf "${tmp}"' EXIT

      arch="$(go env GOARCH)"
      mkdir -p "${tmp}/linux/${arch}"

      CGO_ENABLED=0 GOOS=linux GOARCH="${arch}" go build \
        -trimpath \
        -ldflags "-s -w -buildid= -X main.version=dev" \
        -o "${tmp}/linux/${arch}/labctl" \
        ./cmd/labctl

      cp Dockerfile "${tmp}/Dockerfile"
      DOCKER_BUILDKIT=1 docker build \
        --platform "linux/${arch}" \
        --build-arg "TARGETPLATFORM=linux/${arch}" \
        -t labctl:smoke \
        "${tmp}"

      output="$(docker run --rm labctl:smoke version)"
      printf "version output: %s\n" "${output}"
      [[ "${output}" == "labctl dev" ]]
    toolchains: 'system'
    deps:
      - 'schemas:generate-check'
    inputs:
      - '/go.work'
      - '/go.work.sum'
      - '/schemas/lab/**/*.cue'
      - '/schemas/lab/**/*.go'
      - '**/*.go'
      - 'Dockerfile'
      - 'go.mod'
      - 'go.sum'
    options:
      cache: false

  check:
    deps:
      - 'labctl:format'
      - 'labctl:lint'
      - 'labctl:test'
    options:
      cache: false
      runInCI: true
