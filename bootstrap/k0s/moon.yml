layer: 'scaffolding'
tags:
  - 'bootstrap'
  - 'docker'
  - 'k0s'

project:
  title: 'bootstrap-k0s'
  description: 'Temporary VyOS-hosted k0s bootstrap image.'
  owner: 'GilmanLab'
  maintainers:
    - 'josh'

tasks:
  lint:
    command: 'proto run hadolint -- Dockerfile'
    toolchains: 'system'
    inputs:
      - '/.prototools'
      - '/.moon/proto/cue.toml'
      - '/.moon/proto/hadolint.toml'
      - 'Dockerfile'
    options:
      cache: false
      runInCI: true
  vet:
    command: >-
      bash -lc "proto run cue -- vet -c k0s.cue
      -t pod_cidr=10.244.0.0/16
      -t service_cidr=10.96.0.0/12
      -t public_ip=10.10.20.1
      -t artifacts_file_server=http://10.10.20.1:7173
      -t dhcp_bind_interface=eth1.20
      -t hookos_arch=x86_64
      -t hookos_kernel_version=6.6
      -t hookos_extension=tar.gz
      -t dhcp_mode=reservation
      -t tink_server_addr_port=10.10.20.1:42113
      -t osie_url=http://10.10.20.1:7173
      -t trusted_proxies=10.244.0.0/16,10.96.0.0/12"
    toolchains: 'system'
    inputs:
      - '/.prototools'
      - '/.moon/proto/cue.toml'
      - 'k0s.cue'
    options:
      cache: false
      runInCI: true
  check:
    command: >-
      bash -lc "proto run hadolint -- Dockerfile &&
      proto run cue -- vet -c k0s.cue
      -t pod_cidr=10.244.0.0/16
      -t service_cidr=10.96.0.0/12
      -t public_ip=10.10.20.1
      -t artifacts_file_server=http://10.10.20.1:7173
      -t dhcp_bind_interface=eth1.20
      -t hookos_arch=x86_64
      -t hookos_kernel_version=6.6
      -t hookos_extension=tar.gz
      -t dhcp_mode=reservation
      -t tink_server_addr_port=10.10.20.1:42113
      -t osie_url=http://10.10.20.1:7173
      -t trusted_proxies=10.244.0.0/16,10.96.0.0/12 &&
      DOCKER_BUILDKIT=1 docker build -t bootstrap-k0s:test -f Dockerfile ../.."
    toolchains: 'system'
    inputs:
      - '/.prototools'
      - '/.moon/proto/cue.toml'
      - '/.moon/proto/hadolint.toml'
      - 'Dockerfile'
      - 'README.md'
      - 'VERSION'
      - 'bootstrap-k0s.sh'
      - 'k0s.cue'
      - 'manifests/**/*'
    options:
      cache: false
      runInCI: true
