gilmanLab:
  bgpLb:
    enabled: true

cilium:
  debug:
    verbose: ""
  ipam:
    mode: kubernetes

  kubeProxyReplacement: true
  bgpControlPlane:
    enabled: true

  defaultLBServiceIPAM: none
  policyCIDRMatchMode: []

  securityContext:
    capabilities:
      ciliumAgent:
        - CHOWN
        - KILL
        - NET_ADMIN
        - NET_RAW
        - IPC_LOCK
        - SYS_ADMIN
        - SYS_RESOURCE
        - DAC_OVERRIDE
        - FOWNER
        - SETGID
        - SETUID
      cleanCiliumState:
        - NET_ADMIN
        - SYS_ADMIN
        - SYS_RESOURCE

  cgroup:
    autoMount:
      enabled: false
    hostRoot: /sys/fs/cgroup

  k8sServiceHost: localhost
  k8sServicePort: 7445

  operator:
    replicas: 1

  nodePort:
    addresses: []

  hubble:
    enabled: true
    relay:
      enabled: true
    ui:
      enabled: true
