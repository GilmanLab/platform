apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: default
  sources:
    - repoURL: quay.io/cilium/charts
      chart: cilium
      targetRevision: 1.19.3
      helm:
        releaseName: cilium
        valueFiles:
          - $values/bootstrap/cilium/values/base.yaml
          - $values/bootstrap/cilium/values/full-overrides.yaml
    - repoURL: https://github.com/GilmanLab/platform.git
      targetRevision: cilium-v1.1.0
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
