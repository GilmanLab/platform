apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: ghcr.io/argoproj/argo-helm
      chart: argo-cd
      targetRevision: 9.5.2
      helm:
        releaseName: argocd
        valueFiles:
          - $values/bootstrap/argocd/values/base.yaml
          - $values/bootstrap/argocd/values/full-overrides.yaml
    - repoURL: https://github.com/GilmanLab/platform.git
      targetRevision: argocd-v1.0.1
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
